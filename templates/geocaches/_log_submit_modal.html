<div class="modal fade" id="newLogModal" tabindex="-1" aria-labelledby="newLogModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <form method="post" action="{% url 'geocaches:log_submit' cache.display_code %}"
          enctype="multipart/form-data">
      {% csrf_token %}
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title" id="newLogModalLabel">New log for {{ cache.name }}</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="font-size:.7rem"></button>
        </div>
        <div class="modal-body">
          {% include "geocaches/_log_form_fields.html" %}
        </div>
        <div class="modal-footer py-1 d-flex justify-content-between align-items-center">
          {% if submit_platforms %}
          <button type="button" class="btn btn-sm btn-outline-secondary" onclick="gcfImageOpen()">+ Add image</button>
          {% else %}
          <div></div>
          {% endif %}
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-sm btn-primary">Submit log</button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

{% if submit_platforms %}
{% include "geocaches/_log_image_dialog.html" %}
<script>
gcfImageSetPlatforms([{% for p in submit_platforms %}'{{ p.id }}'{% if not forloop.last %},{% endif %}{% endfor %}]);
</script>
{% endif %}
