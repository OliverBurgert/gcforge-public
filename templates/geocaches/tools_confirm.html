{% extends "base.html" %}
{% block title %}{{ title }} — GCForge{% endblock %}
{% block content %}
<div class="px-3 py-3" style="max-width:600px">
  <h5 class="mb-3">{{ title }}</h5>
  <div class="card">
    <div class="card-body">
      <p>{{ description }}</p>
      <div class="d-flex gap-2">
        <form method="post" action="{{ action_url }}">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">{{ submit_label }}</button>
        </form>
        <a href="{% url 'geocaches:list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
